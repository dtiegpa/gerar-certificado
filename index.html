<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerar Certificados</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    input, textarea, button { width: 100%; padding: 10px; margin: 10px 0; }
    textarea { resize: vertical; }
  </style>
</head>
<body>

  <h1>Gerador de Certificados</h1>
  <form id="certForm">
    <input type="text" name="certificacao" placeholder="Nome da Certificação" required>
    <input type="text" name="periodo" placeholder="Período" required>
    <input type="text" name="cargahoraria" placeholder="Carga Horária" required>
    <input type="text" name="professor" placeholder="Professor" required>
    <input type="date" name="data" required>
    <textarea name="alunos" rows="10" placeholder="Insira um nome por linha" required></textarea>
    <button type="submit">Gerar Certificados</button>
  </form>

  <div id="mensagem"></div>

  <script>
    document.getElementById('certForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const dados = {
        certificacao: formData.get('certificacao'),
        periodo: formData.get('periodo'),
        cargahoraria: formData.get('cargahoraria'),
        professor: formData.get('professor'),
        data: formData.get('data'),
        alunos: formData.get('alunos').split('\n').map(nome => nome.trim()).filter(Boolean)
      };

      document.getElementById('mensagem').textContent = 'Gerando certificados...';

      try {
        const resposta = await fetch('https://script.google.com/macros/s/AKfycbw2lbVMH5sIq0qoPlh_x4HUA6yFC1_8bBgcbjRAjZSMOUz_mJa6aT55ZoZbU7wSxfF5/exec', {
          method: 'POST',
          body: JSON.stringify(dados),
          headers: { 'Content-Type': 'application/json' }
        });
        const resultado = await resposta.json();
        document.getElementById('mensagem').innerHTML = `✅ Certificados gerados! <a href="${resultado.pastaUrl}" target="_blank">Acesse aqui</a>`;
      } catch (erro) {
        try {
          const texto = await erro.response.text();
          document.getElementById('mensagem').textContent = `❌ Erro detalhado: ${texto}`;
        } catch {
          document.getElementById('mensagem').textContent = '❌ Erro inesperado. Verifique o console.';
          console.error(erro);
        }
      }
    });
  </script>

</body>
</html>
